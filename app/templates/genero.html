<div class="container mt-5">
    <h2 class="mb-4">Gêneros Literários</h2>
    <table class="table table-hover">
        <thead class="thead-dark">
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Descrição do Gênero</th>
            </tr>
        </thead>
        <tbody>
            {% for genero in generos %}
                <tr>
                    <td>{{ genero.id }}</td>
                    <td>{{ genero.nome }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
