<div class="container mt-5">
    <h2 class="mb-4">Lista de Cidades</h2>
    <table class="table table-hover">
        <thead class="thead-dark">
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Nome da Cidade</th>
                <th scope="col">Estado (UF)</th>
            </tr>
        </thead>
        <tbody>
            {% for cidade in cidades %}
                <tr>
                    <td>{{ cidade.id }}</td>
                    <td>{{ cidade.nome }}</td>
                    <td>{{ cidade.uf }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
